<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan Personalizado — Wilmin Estévez Coaching</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #18181b; }
    #frame { width: 100%; height: 100%; border: none; display: none; }
    #loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh;
      font-family: system-ui, sans-serif; color: #a1a1aa; gap: 16px;
    }
    #loading svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh;
      font-family: system-ui, sans-serif; color: #a1a1aa; gap: 12px; text-align: center; padding: 24px;
    }
    #error h2 { color: #f4f4f5; font-size: 1.25rem; }
    #error p { font-size: 0.875rem; max-width: 400px; line-height: 1.6; }
  </style>
</head>
<body>
  <div id="loading">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#FF4500" stroke-width="2.5" stroke-linecap="round">
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
    </svg>
    <span style="font-size:0.9rem">Cargando tu plan…</span>
  </div>
  <div id="error">
    <h2>Plan no encontrado</h2>
    <p>El enlace puede estar incorrecto o el plan aún no está disponible. Contacta a Wilmin si el problema persiste.</p>
  </div>
  <iframe id="frame" sandbox="allow-same-origin allow-scripts"></iframe>

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var filePath = params.get('f');

      if (!filePath) {
        showError(); return;
      }

      // Strip leading slash if present
      filePath = filePath.replace(/^\//, '');

      var apiUrl = 'https://api.github.com/repos/wilmin-estevez/Wilmincoaching/contents/' + encodeURIComponent(filePath);

      fetch(apiUrl, { headers: { 'Accept': 'application/vnd.github.v3+json' } })
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function (data) {
          if (!data.content) throw new Error('no content');
          // Decode base64 — GitHub returns it with newlines
          var raw = data.content.replace(/\n/g, '');
          var html = decodeURIComponent(
            atob(raw).split('').map(function (c) {
              return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join('')
          );
          var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
          var url = URL.createObjectURL(blob);
          var frame = document.getElementById('frame');
          frame.onload = function () {
            document.getElementById('loading').style.display = 'none';
            frame.style.display = 'block';
          };
          frame.src = url;
        })
        .catch(function () {
          showError();
        });

      function showError() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'flex';
      }
    })();
  </script>
</body>
</html>
