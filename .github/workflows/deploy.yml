name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - 'data/sync.json'
      - 'data/session.json'
      - 'data/fotos.json'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: landing

      - name: Build landing page
        run: npm run build
        working-directory: landing

      - name: Assemble deployment folder
        run: |
          mkdir -p _site
          # Landing page at root
          cp -r landing/out/. _site/
          # Coaching app at /app
          mkdir -p _site/app
          cp app/index.html _site/app/index.html
          # Client plans at /planes (publicly accessible)
          if [ -d planes ]; then
            cp -r planes _site/planes
          fi
          # Custom domain
          cp CNAME _site/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
